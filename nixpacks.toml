providers = ["node"]

[variables]
NODE_VERSION = "22"
PNPM_VERSION = "10"
NIXPACKS_NODE_PACKAGE_MANAGER = "pnpm"

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "node scripts/start-with-cron.mjs"
